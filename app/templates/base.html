<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlindUp</title>
    <link rel="icon" type="image/x-icon" href="/static/brand/favicon.ico" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body
    data-page="{{ page_id }}"
    {% if editor_mode %}
    data-editor-mode="{{ editor_mode }}"
    {% endif %}
    {% if blindtest_id is not none %}
    data-blindtest-id="{{ blindtest_id }}"
    {% endif %}
  >
    <main class="app-shell">
      {% if page_id != "home" %}
        <header class="page-header">
          <div class="page-header-main">
            <div class="page-header-copy">
              <p class="eyebrow">BlindUp</p>
              <h1 id="page-title">{{ page_title }}</h1>
            </div>
            <div
              id="page-song-count"
              class="page-song-count"
              aria-live="polite"
              hidden
            >
              <span id="page-song-count-value" class="page-song-count-value">0</span>
              <span class="page-song-count-label">songs</span>
            </div>
          </div>
        </header>
      {% else %}
        <h1 id="page-title" class="visually-hidden">{{ page_title }}</h1>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
