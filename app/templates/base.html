<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlindUp</title>
    <link rel="icon" type="image/png" href="/static/brand/blindup-dark.png" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body
    data-page="{{ page_id }}"
    {% if editor_mode %}
    data-editor-mode="{{ editor_mode }}"
    {% endif %}
    {% if blindtest_id is not none %}
    data-blindtest-id="{{ blindtest_id }}"
    {% endif %}
  >
    <main class="app-shell">
      <header class="page-header{% if page_id == 'home' %} page-header-logo-only{% endif %}">
        {% if page_id == "home" %}
          <a class="brand-mark" href="/home" aria-label="BlindUp home">
            <img src="/static/brand/blindup-dark.png" alt="BlindUp" />
          </a>
          <h1 id="page-title" class="visually-hidden">{{ page_title }}</h1>
        {% else %}
          <p class="eyebrow">BlindUp</p>
          <h1 id="page-title">{{ page_title }}</h1>
        {% endif %}
      </header>

      {% block content %}{% endblock %}
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
